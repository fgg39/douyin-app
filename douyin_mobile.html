<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0c0c14"/>
<title>抖音下載器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0c14;
  --surface:  #14141f;
  --card:     #1c1c2a;
  --border:   #2a2a3d;
  --red:      #ff2d55;
  --teal:     #00e5cc;
  --gold:     #ffd60a;
  --muted:    #55556a;
  --text:     #f0f0f8;
  --sub:      #8888a8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ── APP SHELL ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ── STATUS BAR SPACER ── */
.safe-top {
  height: var(--safe-top);
  background: var(--bg);
  flex-shrink: 0;
}

/* ── TOP NAV ── */
.topnav {
  flex-shrink: 0;
  background: rgba(12,12,20,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-icon {
  width: 32px; height: 32px;
  background: var(--red);
  border-radius: 9px;
  display: grid;
  place-items: center;
  font-size: 17px;
  box-shadow: 0 4px 12px rgba(255,45,85,.4);
}

.nav-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.3px;
}

.nav-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
}

/* ── PAGES ── */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 24px;
  display: none;
  animation: fadeSlideUp .25s ease;
}

.page.active { display: block; }

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SECTION LABEL ── */
.sec-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ── INPUT CARD ── */
.input-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
}

.url-field {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 0 14px;
  margin-bottom: 14px;
  transition: border-color .2s;
}
.url-field:focus-within {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(255,45,85,.12);
}

.url-field-icon { font-size: 16px; flex-shrink: 0; }

.url-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 14px 0;
  min-width: 0;
}
.url-input::placeholder { color: var(--muted); font-size: 11px; }

.url-clear {
  width: 22px; height: 22px;
  background: var(--muted);
  border-radius: 50%;
  border: none;
  color: var(--bg);
  font-size: 13px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 700;
  line-height: 1;
}
.url-input:not(:placeholder-shown) ~ .url-clear { display: flex; }

/* Mode toggles */
.mode-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.mode-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--sub);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  user-select: none;
}
.mode-btn.on {
  background: rgba(255,45,85,.12);
  border-color: var(--red);
  color: var(--red);
}

/* Big action button */
.btn-start {
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .1s, box-shadow .15s, background .15s;
  box-shadow: 0 8px 24px rgba(255,45,85,.35);
}
.btn-start:active { transform: scale(.97); box-shadow: 0 4px 12px rgba(255,45,85,.3); }
.btn-start:disabled { background: var(--border); color: var(--muted); box-shadow: none; cursor: not-allowed; }

/* Spinner */
.spin {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── COOKIE ACCORDION ── */
.acc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: background .15s;
}
.acc-header:active { background: var(--border); }

.acc-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
}

.acc-tag {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  background: rgba(255,214,10,.15);
  color: var(--gold);
  border-radius: 5px;
  padding: 3px 7px;
  border: 1px solid rgba(255,214,10,.25);
}

.acc-arrow {
  font-size: 12px;
  color: var(--muted);
  transition: transform .2s;
}
.acc-arrow.open { transform: rotate(180deg); }

.acc-body {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 14px 14px;
  padding: 16px;
  margin-top: -8px;
  margin-bottom: 14px;
  gap: 10px;
  grid-template-columns: 1fr 1fr;
}
.acc-body.open { display: grid; }

.cf label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
}

.cf input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
}
.cf input:focus { border-color: var(--teal); }

/* ── PROGRESS PAGE ── */
.prog-hero {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
}

.prog-status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.led.run { background: var(--teal); animation: ledpulse 1s infinite; }
.led.done { background: #00e57a; animation: none; }
.led.err  { background: var(--red); animation: none; }
@keyframes ledpulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }

.prog-status-text {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}

.prog-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--teal);
}

.prog-bar {
  height: 4px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 16px;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--teal));
  border-radius: 100px;
  width: 0%;
  transition: width .5s ease;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.stat {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.stat-n {
  font-family: 'Outfit', sans-serif;
  font-size: 26px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-n.r { color: var(--red); }
.stat-n.t { color: var(--teal); }
.stat-n.g { color: var(--gold); }

.stat-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
}

/* Terminal */
.terminal {
  background: #080810;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 14px;
}

.term-bar {
  background: var(--surface);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}

.term-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

.term-body {
  padding: 12px 14px;
  height: 180px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  line-height: 1.8;
  -webkit-overflow-scrolling: touch;
}
.term-body::-webkit-scrollbar { display: none; }

.ll { display: block; }
.ll.i  { color: #444460; }
.ll.ok { color: #00e57a; }
.ll.er { color: #ff4466; }
.ll.w  { color: var(--gold); }
.ll.hi { color: #c8c8f0; }

/* ── RESULTS PAGE ── */
.results-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.results-count {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -.5px;
}

.results-count span {
  font-size: 13px;
  font-weight: 400;
  color: var(--sub);
  margin-left: 4px;
}

.btn-zip {
  background: linear-gradient(135deg, var(--teal), #00a896);
  color: #0c0c14;
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 14px rgba(0,229,204,.25);
}
.btn-zip:active { transform: scale(.96); }

/* Grid */
.mgrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  border-radius: 14px;
  overflow: hidden;
}

.mitem {
  position: relative;
  aspect-ratio: 3/4;
  background: var(--card);
  overflow: hidden;
  cursor: pointer;
}

.mitem img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.mitem:active img { transform: scale(.95); }

.mitem-type {
  position: absolute;
  top: 5px; left: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 3px 5px;
  border-radius: 4px;
}
.mitem-type.v { background: var(--red); color: #fff; }
.mitem-type.i { background: var(--teal); color: #0c0c14; }

.mitem-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 55%);
  display: flex;
  align-items: flex-end;
  padding: 6px;
}

.mitem-dl {
  width: 28px; height: 28px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* skeleton loader */
.mitem.skeleton::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── BOTTOM NAV ── */
.bottomnav {
  flex-shrink: 0;
  background: rgba(12,12,20,.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bot);
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  cursor: pointer;
  transition: opacity .15s;
  user-select: none;
  border: none;
  background: none;
  color: var(--muted);
  gap: 4px;
}
.nav-tab:active { opacity: .6; }
.nav-tab.active { color: var(--red); }

.tab-icon { font-size: 22px; line-height: 1; }
.tab-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3px;
}

.tab-badge {
  position: absolute;
  top: 8px;
  right: calc(50% - 18px);
  background: var(--red);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.tab-badge.show { display: flex; }

.nav-tab { position: relative; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 30px;
  color: var(--muted);
}
.empty-icon { font-size: 52px; display: block; margin-bottom: 14px; opacity: .35; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--sub); }
.empty-sub { font-size: 13px; line-height: 1.7; font-weight: 300; }

/* Guide card */
.guide-card {
  background: rgba(255,214,10,.06);
  border: 1px solid rgba(255,214,10,.2);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  gap: 12px;
}
.guide-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.guide-title { font-size: 12px; font-weight: 700; color: #c8a800; margin-bottom: 8px; }
.guide-steps { list-style: none; }
.guide-steps li {
  font-size: 11px;
  color: #a08800;
  line-height: 1.8;
  padding-left: 14px;
  position: relative;
}
.guide-steps li::before { content:'›'; position:absolute;left:0; font-weight:700; }
code { font-family:'JetBrains Mono',monospace; background:rgba(0,0,0,.2); border-radius:3px; padding:1px 4px; font-size:10px; }

/* Demo badge */
.demo-banner {
  background: rgba(0,229,204,.08);
  border: 1px solid rgba(0,229,204,.25);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 11px;
  color: var(--teal);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .5px;
  margin-bottom: 14px;
  text-align: center;
  display: none;
}
.demo-banner.show { display: block; }

/* Pull-to-refresh hint */
.ptr-hint {
  text-align: center;
  padding: 10px;
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

@media (max-width:380px) {
  .mgrid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<div id="app">

  <div class="safe-top"></div>

  <!-- Top Nav -->
  <div class="topnav">
    <div class="nav-brand">
      <div class="nav-icon">🎵</div>
      <div class="nav-title">抖音下載器</div>
    </div>
    <div class="nav-badge">DOUYIN DL</div>
  </div>

  <!-- Pages -->
  <div class="pages">

    <!-- ① 首頁 / 下載設定 -->
    <div class="page active" id="page-home">

      <div class="guide-card">
        <div class="guide-icon">⚡</div>
        <div>
          <div class="guide-title">啟動後端才能真實下載</div>
          <ul class="guide-steps">
            <li><code>git clone https://github.com/jiji262/douyin-downloader</code></li>
            <li><code>pip install flask flask-cors pyyaml</code></li>
            <li><code>python server.py</code> → 開啟 localhost:5000</li>
            <li>未連線時自動進入示範模式 ✓</li>
          </ul>
        </div>
      </div>

      <div class="sec-label">目標帳號</div>
      <div class="input-card">
        <div class="url-field">
          <span class="url-field-icon">🔗</span>
          <input type="url" class="url-input" id="urlInput"
            placeholder="https://www.douyin.com/user/MS4w..."
            inputmode="url" autocomplete="off" spellcheck="false"/>
          <button class="url-clear" onclick="document.getElementById('urlInput').value='';this.style.display='none'">✕</button>
        </div>

        <div class="mode-row">
          <button class="mode-btn on"  id="m-post"    onclick="toggleMode(this)">📹 發佈</button>
          <button class="mode-btn"     id="m-like"    onclick="toggleMode(this)">❤️ 按讚</button>
          <button class="mode-btn"     id="m-collect" onclick="toggleMode(this)">⭐ 收藏</button>
        </div>

        <button class="btn-start" id="startBtn" onclick="handleStart()">
          <div class="spin" id="spin"></div>
          <span id="btnText">開始下載</span>
        </button>
      </div>

      <!-- Cookie accordion -->
      <div class="acc-header" onclick="toggleAcc()">
        <div class="acc-left">
          <span>🍪</span>
          <span>Cookie 設定</span>
          <span class="acc-tag">建議填入</span>
        </div>
        <span class="acc-arrow" id="accArrow">▼</span>
      </div>
      <div class="acc-body" id="accBody">
        <div class="cf"><label>TTWID</label><input type="password" id="c1" placeholder="your_ttwid"/></div>
        <div class="cf"><label>ODIN_TT</label><input type="password" id="c2" placeholder="your_odin_tt"/></div>
        <div class="cf"><label>MSTOKEN</label><input type="password" id="c3" placeholder="your_msToken"/></div>
        <div class="cf"><label>CSRF TOKEN</label><input type="password" id="c4" placeholder="passport_csrf_token"/></div>
      </div>

    </div><!-- /page-home -->

    <!-- ② 進度頁 -->
    <div class="page" id="page-progress">

      <div class="demo-banner" id="demoBanner">⚡ 示範模式 · 後端未連線</div>

      <div class="prog-hero">
        <div class="prog-status-row">
          <div class="led" id="led"></div>
          <div class="prog-status-text" id="progStatusText">準備中...</div>
          <div class="prog-pct" id="progPct">0%</div>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" id="progFill"></div>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-n r" id="sTotal">0</div>
            <div class="stat-l">總數</div>
          </div>
          <div class="stat">
            <div class="stat-n t" id="sDone">0</div>
            <div class="stat-l">完成</div>
          </div>
          <div class="stat">
            <div class="stat-n g" id="sSkip">0</div>
            <div class="stat-l">失敗</div>
          </div>
        </div>
      </div>

      <div class="terminal">
        <div class="term-bar">
          <div class="term-dot" style="background:#ff5f57"></div>
          <div class="term-dot" style="background:#ffbd2e"></div>
          <div class="term-dot" style="background:#28ca42"></div>
        </div>
        <div class="term-body" id="termBody"></div>
      </div>

      <div class="ptr-hint">下載完成後自動跳至結果頁</div>

    </div><!-- /page-progress -->

    <!-- ③ 結果頁 -->
    <div class="page" id="page-results">

      <div class="results-top">
        <div class="results-count" id="resultsCount">0<span>個作品</span></div>
        <button class="btn-zip" onclick="dlZip()">
          <span>⬇</span> ZIP 下載
        </button>
      </div>

      <div class="mgrid" id="mgrid">
        <div class="empty">
          <span class="empty-icon">🖼</span>
          <div class="empty-title">尚無內容</div>
          <div class="empty-sub">下載完成後<br>圖文會顯示在這裡</div>
        </div>
      </div>

    </div><!-- /page-results -->

  </div><!-- /pages -->

  <!-- Bottom Nav -->
  <div class="bottomnav">
    <button class="nav-tab active" id="tab-home" onclick="goPage('home')">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">下載</span>
    </button>
    <button class="nav-tab" id="tab-progress" onclick="goPage('progress')">
      <span class="tab-icon">📊</span>
      <span class="tab-label">進度</span>
      <span class="tab-badge" id="badge-prog"></span>
    </button>
    <button class="nav-tab" id="tab-results" onclick="goPage('results')">
      <span class="tab-icon">🗂</span>
      <span class="tab-label">結果</span>
      <span class="tab-badge" id="badge-res"></span>
    </button>
  </div>

</div><!-- /app -->

<script>
// ── Nav ──
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleMode(btn) { btn.classList.toggle('on'); }

function toggleAcc() {
  const b = document.getElementById('accBody');
  const a = document.getElementById('accArrow');
  b.classList.toggle('open');
  a.classList.toggle('open');
}

// ── State ──
let running = false;
let demoMode = false;
let items = [];
let doneCount = 0, skipCount = 0, totalCount = 0;

// ── Log ──
function tlog(msg, type = 'i') {
  const tb = document.getElementById('termBody');
  const s = document.createElement('span');
  const t = new Date().toLocaleTimeString('zh-TW',{hour12:false});
  s.className = 'll ' + type;
  s.textContent = `${t} ${msg}`;
  tb.appendChild(s);
  tb.appendChild(document.createTextNode('\n'));
  tb.scrollTop = tb.scrollHeight;
}

function setLed(state) {
  const l = document.getElementById('led');
  l.className = 'led ' + state;
}

function setStats(total, done, skip) {
  totalCount = total; doneCount = done; skipCount = skip;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sDone').textContent  = done;
  document.getElementById('sSkip').textContent  = skip;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  // badge
  const br = document.getElementById('badge-res');
  if (done > 0) { br.textContent = done; br.classList.add('show'); } else { br.classList.remove('show'); }
}

function setProgStatus(text) {
  document.getElementById('progStatusText').textContent = text;
}

// ── Start ──
async function handleStart() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) {
    document.getElementById('urlInput').focus();
    document.querySelector('.url-field').style.borderColor = 'var(--red)';
    setTimeout(() => document.querySelector('.url-field').style.borderColor = '', 1500);
    return;
  }

  const modes = [];
  if (document.getElementById('m-post').classList.contains('on'))    modes.push('post');
  if (document.getElementById('m-like').classList.contains('on'))    modes.push('like');
  if (document.getElementById('m-collect').classList.contains('on')) modes.push('collect');
  if (!modes.length) modes.push('post');

  const cookies = {
    ttwid: document.getElementById('c1').value.trim(),
    odin_tt: document.getElementById('c2').value.trim(),
    msToken: document.getElementById('c3').value.trim(),
    passport_csrf_token: document.getElementById('c4').value.trim(),
  };

  // Reset
  document.getElementById('termBody').innerHTML = '';
  document.getElementById('mgrid').innerHTML = '';
  items = [];
  setStats(0,0,0);
  document.getElementById('demoBanner').classList.remove('show');

  // Lock btn
  document.getElementById('startBtn').disabled = true;
  document.getElementById('spin').style.display = 'block';
  document.getElementById('btnText').textContent = '下載中...';
  running = true;

  // Switch to progress
  goPage('progress');
  setLed('run');
  setProgStatus('連接後端服務...');

  tlog('目標：' + url.slice(0,40) + (url.length>40?'…':''), 'hi');
  tlog('模式：' + modes.join(' + '), 'i');
  tlog('連接 localhost:5000 ...', 'i');

  // Badge for progress
  document.getElementById('badge-prog').textContent = '●';
  document.getElementById('badge-prog').classList.add('show');

  try {
    const res = await fetch('http://localhost:5000/api/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url, modes, cookies}),
      signal: AbortSignal.timeout(4000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const {job_id} = await res.json();
    tlog('任務建立 · Job ' + job_id, 'ok');
    demoMode = false;
    pollJob(job_id);
  } catch(e) {
    tlog('後端未連接 (' + e.message + ')', 'w');
    tlog('啟動示範模式...', 'w');
    demoMode = true;
    document.getElementById('demoBanner').classList.add('show');
    runDemo(url, modes);
  }
}

// ── Poll backend ──
function pollJob(id) {
  const iv = setInterval(async () => {
    try {
      const r = await fetch('http://localhost:5000/api/status/' + id);
      const d = await r.json();
      setStats(d.total, d.done, d.skip||0);
      setProgStatus(d.status === 'running' ? `下載中 ${d.done}/${d.total}` : '完成');
      (d.new_logs||[]).forEach(l => tlog(l.msg, l.type === 'success' ? 'ok' : l.type === 'error' ? 'er' : l.type === 'warn' ? 'w' : 'i'));
      (d.new_items||[]).forEach(item => { items.push(item); addCard(item); });
      if (d.status === 'done' || d.status === 'error') {
        clearInterval(iv);
        finalize(d.status);
      }
    } catch(e) {}
  }, 1500);
}

// ── Demo simulation ──
const SEEDS = [11,22,33,44,55,66,77,88,99,110,121,132];
const DESCS = [
  '今天去了超美的地方 🌸','最近的穿搭分享 ootd ✨','這個食譜真的太好吃了！😋',
  '記錄生活的小確幸 ☁️','週末和朋友出去玩～','最近喜歡的歌單 🎵',
  '早安！每天元氣滿滿','旅行中遇到的風景 🏔','日常vlog | 平凡快樂',
  '試用了新產品分享','貓貓今天很可愛 🐱','學到新技能！分享給大家',
];

function runDemo(url, modes) {
  const total = SEEDS.length;
  setStats(total, 0, 0);
  setProgStatus('解析帳號...');

  const setup = [
    ['取得用戶資訊成功', 'ok'],
    ['發現 ' + total + ' 個作品', 'hi'],
    ['開始 5 執行緒下載...', 'i'],
  ];

  let si = 0;
  const p1 = setInterval(() => {
    if (si < setup.length) { tlog(setup[si][0], setup[si][1]); si++; }
    else { clearInterval(p1); phase2(); }
  }, 500);

  function phase2() {
    let i = 0, done = 0, skip = 0;
    const iv = setInterval(() => {
      if (i >= total) { clearInterval(iv); finalize('done'); return; }
      const fail = (i === 2);
      if (fail) {
        skip++;
        tlog(`[${i+1}/${total}] ✗ 下載失敗（封鎖）item_${i}`, 'w');
      } else {
        done++;
        const type = (i % 4 === 0) ? 'video' : 'image';
        const item = {
          id: 'demo_' + i,
          type,
          thumbnail: 'https://picsum.photos/seed/' + SEEDS[i] + '/300/400',
          desc: DESCS[i % DESCS.length],
          filename: type === 'video' ? `video_${i}.mp4` : `img_${i}.jpg`,
          count: type === 'image' ? Math.floor(Math.random()*6+2) : null,
        };
        items.push(item);
        addCard(item);
        tlog(`[${done+skip}/${total}] ✓ ${item.filename}`, 'ok');
      }
      setStats(total, done, skip);
      setProgStatus(`下載中 ${done+skip}/${total}`);
      updateResultsCount();
      i++;
    }, 320);
  }
}

function finalize(status) {
  setLed(status === 'done' ? 'done' : 'err');
  const msg = status === 'done'
    ? `✅ 完成！共 ${doneCount} 個，失敗 ${skipCount} 個`
    : '⚠️ 任務結束（部分失敗）';
  tlog(msg, status === 'done' ? 'ok' : 'w');
  setProgStatus(status === 'done' ? '下載完成 🎉' : '任務結束');

  // Clear progress badge
  document.getElementById('badge-prog').classList.remove('show');

  // Reset btn
  document.getElementById('startBtn').disabled = false;
  document.getElementById('spin').style.display = 'none';
  document.getElementById('btnText').textContent = '開始下載';
  running = false;

  // Auto-switch to results after 1.2s
  setTimeout(() => goPage('results'), 1200);
}

// ── Render card ──
function addCard(item) {
  const grid = document.getElementById('mgrid');
  // Remove empty state
  const empty = grid.querySelector('.empty');
  if (empty) empty.remove();

  const d = document.createElement('div');
  d.className = 'mitem';
  d.innerHTML = `
    <img src="${item.thumbnail||''}" alt="" loading="lazy"
      onerror="this.parentElement.style.background='var(--border)';this.style.display='none'">
    <span class="mitem-type ${item.type==='video'?'v':'i'}">${item.type==='video'?'VIDEO':'IMG'}</span>
    <div class="mitem-overlay">
      <button class="mitem-dl" onclick="dlOne('${item.id}','${item.filename||''}',event)">⬇</button>
    </div>`;
  grid.appendChild(d);
  updateResultsCount();
}

function updateResultsCount() {
  document.getElementById('resultsCount').innerHTML = items.length + '<span>個作品</span>';
  const br = document.getElementById('badge-res');
  if (items.length > 0) { br.textContent = items.length; br.classList.add('show'); }
}

function dlOne(id, filename, e) {
  e.stopPropagation();
  if (demoMode) {
    const item = items.find(i => i.id === id);
    if (item?.thumbnail) window.open(item.thumbnail, '_blank');
    else alert('示範模式 · 請啟動後端服務');
    return;
  }
  window.location.href = 'http://localhost:5000/api/download/' + id;
}

function dlZip() {
  if (demoMode) { alert('⚠️ 示範模式\n請啟動 server.py 後再使用 ZIP 下載'); return; }
  window.location.href = 'http://localhost:5000/api/download-zip';
}
</script>
</body>
</html>
